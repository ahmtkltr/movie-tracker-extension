<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Tracker</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>Movie Tracker</h1>
        <div class="header-actions">
            <!-- View Toggle -->
            <div class="view-toggle" title="Toggle View Layout">
                <button id="view-cards-btn" class="toggle-btn active" title="Card View">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                </button>
                <button id="view-list-btn" class="toggle-btn" title="Compact List View">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                </button>
            </div>
            <!-- Export Buttons -->
            <div style="display: flex; gap: 4px;">
                <button id="export-btn" class="btn primary" title="Export Watchlist to Excel (CSV)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    CSV
                </button>
                <button id="export-email-btn" class="btn primary" title="Email Watchlist">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    Email
                </button>
                <button id="settings-btn" class="btn primary" title="Open Settings" style="padding: 6px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Tabs Container -->
    <div class="tabs-container">
        <button class="tab-btn active" data-filter="all">All</button>
        <button class="tab-btn" data-filter="movie">Movies</button>
        <button class="tab-btn" data-filter="series">Series</button>
    </div>

    <!-- Disambiguation Search Modal (Hidden by default) -->
    <div id="search-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Select the Correct Title</h3>
            <p id="search-query-text">Multiple results found.</p>
            <ul id="search-results-list" class="cards-view compact-cards">
                <!-- Search options injected here -->
            </ul>
            <div class="modal-actions">
                <button id="close-modal-btn" class="btn text-btn">Cancel</button>
            </div>
        </div>
    </div>

    <main>
        <!-- Adding State -->
        <div id="loading-state" class="state-container hidden">
            <div class="spinner"></div>
            <p>Scanning OMDB...</p>
        </div>

        <div id="error-state" class="state-container hidden">
            <p id="error-message">Error adding movie.</p>
            <button id="dismiss-error-btn" class="btn text-btn">Dismiss</button>
        </div>

        <!-- Watchlist Empty State -->
        <div id="empty-state" class="state-container">
            <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"></path>
                <path d="M14 2v6h6"></path>
                <circle cx="6" cy="16" r="3"></circle>
                <path d="M9 16h8"></path>
                <path d="M17 16h2"></path>
            </svg>
            <p>Your watchlist is empty.</p>
            <small>Select text on a web page and right-click "Add to Movie Tracker" to begin!</small>
        </div>

        <!-- The 'view-mode' class handles grid vs list styling -->
        <div id="lists-wrapper" class="hidden">
            <h2 class="section-title" id="unwatched-title">🍿 To Watch</h2>
            <ul id="unwatched-container" class="cards-view">
                <!-- Unwatched movie cards will be injected here -->
            </ul>

            <h2 class="section-title" id="watched-title" style="margin-top: 24px;">✅ Watched</h2>
            <ul id="watched-container" class="cards-view">
                <!-- Watched movie cards will be injected here -->
            </ul>
        </div>
    </main>

    <script src="popup.js"></script>
</body>

</html>
